[build]
  command = "npm run build"
  publish = "out"
[build.environment]
  NODE_VERSION = "20"
  SITE_URL = "https://sekoukan-navi.com"
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[redirects]]
  from = "/:pref"
  to = "/:pref/"
  status = 301
[[redirects]]
  from = "/:pref/:job_type"
  to = "/:pref/:job_type/"
  status = 301
